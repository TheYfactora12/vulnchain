# VulnChain SFT Training Configuration
# Adjust based on available GPU memory

model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"  # or "meta-llama/Llama-3.1-8B-Instruct"
  load_in_4bit: true
  max_seq_length: 4096

lora:
  r: 64                    # Rank — try 16, 32, 64
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/sft_v1"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false
  bf16: true                # Use bf16 if on A100/H100; switch to fp16 for T4
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "wandb"

data:
  train_file: "data/generated/train.jsonl"
  eval_file: "data/generated/eval.jsonl"
  text_column: "text"       # Column name after applying chat template
  max_samples: null         # Set to int to limit for debug runs

wandb:
  project: "vulnchain"
  run_name: "sft-v1-r64"   # Update per run
  tags:
    - "sft"
    - "mistral-7b"
    - "lora-r64"
